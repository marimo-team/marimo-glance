# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-issue-forms.json
name: '🐞 Bug report'
description: Report an issue with the Marimo Glance browser extension
labels: [bug]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for filing this bug report and helping us improve Marimo Glance!
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: |
        A clear and concise description of the bug. If you have a workaround or plan to submit a PR for this issue, please let us know.
        You may also include a stack trace or screenshots here.
      placeholder: What happened?
    validations:
      required: true
  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: The GitHub or gist URL where the problem occurred (if the source is public and you can share it).
      placeholder: https://github.com/owner/repo/blob/main/notebook.py
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Other (specify below)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      description: Find this on your browser's extensions page.
      placeholder: e.g. 0.0.0
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Help us help you! List the exact steps that trigger the bug.
      placeholder: |
        1. Open a `.py` notebook on github.com
        2. Click "Switch to interactive marimo notebook"
        3. ...
    validations:
      required: true
  - type: checkboxes
    id: will-submit-pr
    attributes:
      label: Will you submit a PR?
      description: |
        If you plan to submit a PR for this issue, please let us know. We'd love to review a PR!
      options:
        - label: 'Yes'
